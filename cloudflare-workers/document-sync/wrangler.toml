name = "writer-app-document-sync"
main = "worker.js"
compatibility_date = "2024-01-01"

# R2 bucket for document storage.
# The binding name MUST match env.DOCUMENTS_BUCKET references in worker.js.
# Create the bucket first:  npx wrangler r2 bucket create writer-app-documents
[[r2_buckets]]
binding = "DOCUMENTS_BUCKET"
bucket_name = "writer-app-documents"

# JWT_SECRET is a shared HMAC-SHA256 signing secret used to verify tokens
# issued by the writer-app-auth worker. Set it via:
#
#   npx wrangler secret put JWT_SECRET
#
# It MUST match the JWT_SECRET configured in the auth worker.
# NEVER put the secret value in this file.

# Uncomment to use a custom domain:
# routes = [
#   { pattern = "sync.inlaynoteapp.com/*", zone_name = "inlaynoteapp.com" }
# ]
